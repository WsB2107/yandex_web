{% extends "base.html" %}
{% block content %}
<div class="form-container">
    <h2>Настройка музыкальных вкусов</h2>
    <p class="subtitle">Это поможет ИИ подбирать треки точно для вас.</p>
    <form method="POST" action="{{ url_for('profile_setup') }}">
        <div class="form-group">
            <label>Любимые жанры (через запятую)</label>
            <input type="text" name="genres" value="{{ user.genres or '' }}"
                   placeholder="Например: рок, поп, джаз">
        </div>
        <div class="form-group">
            <label>Любимые исполнители (через запятую)</label>
            <input type="text" name="artists" value="{{ user.artists or '' }}"
                   placeholder="Например: The Beatles, Adele, Daft Punk">
        </div>
        <button type="submit" class="btn-accent full-width">Сохранить и продолжить</button>
    </form>
</div>
{% endblock %}
