{% extends "base.html" %}
{% block content %}
<div class="form-container">
    <h2>Вход</h2>
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label>Имя пользователя</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn-accent full-width">Войти</button>
    </form>
    <p class="form-footer">Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a></p>
</div>
{% endblock %}
