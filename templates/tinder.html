{% extends "base.html" %}
{% block content %}
<style>
    .tinder-container { position: relative; height: 70vh; display: flex; align-items: center; justify-content: center; }
    .track-card { background: #1e1e1e; padding: 20px; border-radius: 20px; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: transform 0.3s ease; }
    .cover-image { width: 100%; height: 280px; border-radius: 15px; object-fit: cover; background: #333; }
    .loader { border: 4px solid #333; border-top: 4px solid #fcc419; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; position: absolute; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .controls { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px;}
    .btn-circle { width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .btn-dislike { background: #333; color: white; }
    .btn-like { background: #fcc419; color: black; }
</style>

<div class="tinder-container" id="tinderContainer">
    <div class="loader" id="loader"></div>

    <div class="track-card" id="trackCard" style="display: none;">
        <img id="coverImg" class="cover-image" src="" alt="Cover">
        <h2 id="trackTitle" style="margin: 15px 0 5px 0;">Название трека</h2>
        <p id="trackArtist" style="color: #888; margin: 0 0 20px 0;">Исполнитель</p>
        <p id="trackGenre" style="color: #aaa; margin: 5px 0;">Жанр: <span id="genreValue">—</span></p>

        <div class="controls">
    <button class="btn-circle btn-dislike" onclick="sendAction('dislike')">❌</button>
   <button class="btn-circle btn-playlist">📁</button>
    <button class="btn-circle btn-like" onclick="sendAction('like')">❤️</button>

            <div id="playlistModal" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3>Выберите плейлист</h3>
        <div id="playlistList">
            <p>Загрузка...</p>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="confirmAddBtn" class="btn-accent" style="flex: 1;">➕ Добавить</button>
            <button id="cancelModalBtn" class="btn-outline" style="flex: 1;">Отмена</button>
        </div>
    </div>
</div>
</div>

        </div>
    </div>


<script>

   let currentTrack = {};
let selectedPlaylistId = null;
let currentTrackForPlaylist = null;

async function loadNextTrack() {
    document.getElementById('loader').style.display = 'block';
    document.getElementById('trackCard').style.display = 'none';

    const response = await fetch('/api/get_next_track');
    currentTrack = await response.json();

    document.getElementById('coverImg').src = currentTrack.cover;
    document.getElementById('trackTitle').innerText = currentTrack.title;
    document.getElementById('trackArtist').innerText = currentTrack.artist;
    document.getElementById('genreValue').innerText = currentTrack.genre || 'Неизвестен';

    document.getElementById('loader').style.display = 'none';
    document.getElementById('trackCard').style.display = 'block';
}

async function sendAction(actionType) {
    const card = document.getElementById('trackCard');
    card.style.transform = actionType === 'like' ? 'translateX(100px) rotate(10deg)' : 'translateX(-100px) rotate(-10deg)';
    card.style.opacity = '0';

    await fetch('/action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            artist: currentTrack.artist,
            title: currentTrack.title,
            cover: currentTrack.cover,
            genre: currentTrack.genre,
            action: actionType
        })
    });

    setTimeout(() => {
        card.style.transform = 'none';
        card.style.opacity = '1';
        loadNextTrack();
    }, 300);
}

async function loadPlaylists() {
    const container = document.getElementById('playlistList');
    if (!container) return;
    container.innerHTML = '<p>Загрузка...</p>';
    try {
        const response = await fetch('/api/my_playlists');
        const playlists = await response.json();
        if (playlists.length === 0) {
            container.innerHTML = '<p>У вас нет плейлистов. Создайте их на странице "Плейлисты".</p>';
            return;
        }
        container.innerHTML = '';
        playlists.forEach(pl => {
            const div = document.createElement('div');
            div.className = 'playlist-option';
            div.textContent = pl.name;
            div.dataset.id = pl.id;
            div.onclick = () => {
                document.querySelectorAll('.playlist-option').forEach(opt => opt.classList.remove('selected'));
                div.classList.add('selected');
                selectedPlaylistId = pl.id;
            };
            container.appendChild(div);
        });
        if (playlists.length > 0) {
            const first = document.querySelector('.playlist-option');
            first.classList.add('selected');
            selectedPlaylistId = playlists[0].id;
        }
    } catch (err) {
        container.innerHTML = '<p>Ошибка загрузки плейлистов</p>';
        console.error(err);
    }
}

function showPlaylistModal(track) {
    currentTrackForPlaylist = track;
    const modal = document.getElementById('playlistModal');
    if (!modal) return;
    modal.style.display = 'flex';
    loadPlaylists();
}

async function addToSelectedPlaylist() {
    if (!selectedPlaylistId) {
        alert('Выберите плейлист');
        return;
    }
    if (!currentTrackForPlaylist) return;

    const btn = document.getElementById('confirmAddBtn');
    const originalText = btn.innerText;
    btn.innerText = '⏳';
    btn.disabled = true;

    try {
        const response = await fetch('/add_to_playlist', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                playlist_id: selectedPlaylistId,
                artist: currentTrackForPlaylist.artist,
                title: currentTrackForPlaylist.title,
                cover: currentTrackForPlaylist.cover,
                genre: currentTrackForPlaylist.genre
            })
        });
        const result = await response.json();
        if (response.ok) {
            if (result.status === 'added') {
                btn.innerText = '✅';
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }, 1000);
            } else if (result.status === 'already_exists') {
                alert('Трек уже есть в этом плейлисте');
                btn.innerText = originalText;
                btn.disabled = false;
            }
            closeModal();
        } else {
            alert(result.error || 'Ошибка добавления');
            btn.innerText = originalText;
            btn.disabled = false;
        }
    } catch (err) {
        alert('Ошибка соединения');
        btn.innerText = originalText;
        btn.disabled = false;
    }
}

function closeModal() {
    const modal = document.getElementById('playlistModal');
    if (modal) modal.style.display = 'none';
    selectedPlaylistId = null;
    currentTrackForPlaylist = null;
}

function addToPlaylistHandler() {
    if (!currentTrack.title) return;
    showPlaylistModal(currentTrack);
}

// Инициализация после загрузки страницы
document.addEventListener('DOMContentLoaded', () => {
    loadNextTrack();

    const modal = document.getElementById('playlistModal');
    const closeSpan = document.querySelector('.close-modal');
    const cancelBtn = document.getElementById('cancelModalBtn');
    const confirmBtn = document.getElementById('confirmAddBtn');

    if (closeSpan) closeSpan.onclick = closeModal;
    if (cancelBtn) cancelBtn.onclick = closeModal;
    if (confirmBtn) confirmBtn.onclick = addToSelectedPlaylist;

    if (modal) {
        window.onclick = (event) => {
            if (event.target === modal) closeModal();
        };
    }

    const playlistBtn = document.querySelector('.btn-playlist');
    if (playlistBtn) {
        playlistBtn.onclick = addToPlaylistHandler;
    }
});

window.onload = loadNextTrack;
</script>
{% endblock %}
