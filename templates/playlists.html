{% extends "base.html" %}
{% block content %}
<h1 class="section-title">Мои плейлисты</h1>

<div class="create-playlist">
    <form method="POST" action="{{ url_for('create_playlist') }}">
        <input type="text" name="name" placeholder="Название плейлиста" required>
        <label class="checkbox-label">
            <input type="checkbox" name="is_public"> Открытый (виден всем)
        </label>
        <button type="submit" class="btn-accent">Создать</button>
    </form>
</div>

<div class="playlist-grid">
    {% for playlist in playlists %}
    <a href="{{ url_for('playlist_detail', playlist_id=playlist.id) }}" class="playlist-card">
        <div class="playlist-cover">
            <span>{{ playlist.tracks|length }}</span>
        </div>
        <h3>{{ playlist.name }}</h3>
        <p>{% if playlist.is_public %} 🌐 Открытый {% else %} 🔒 Личный {% endif %}</p>
    </a>
    {% endfor %}
</div>
{% endblock %}
