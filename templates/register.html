{% extends "base.html" %}
{% block content %}
<div class="form-container">
    <h2>Регистрация</h2>
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label>Имя пользователя</label>
            <input type="text" name="username" required placeholder="Придумайте ник">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" required placeholder="Минимум 6 символов">
        </div>
        <button type="submit" class="btn-accent full-width">Зарегистрироваться</button>
    </form>
    <p class="form-footer">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
</div>
{% endblock %}
